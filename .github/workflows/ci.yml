name: BuildFlow AI - CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend packages
        run: |
          cd backend
          npm ci

      - name: Build TypeScript compilation
        run: |
          cd backend
          npm run build

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend packages
        run: |
          cd frontend
          npm ci

      - name: Build production bundle
        run: |
          cd frontend
          npm run build

  docker-build:
    needs: [validate-backend, validate-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: buildflow-api:latest

      - name: Build and test frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: buildflow-web:latest
