version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: buildflow_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: buildflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buildflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buildflow_net

  backend:
    build: ./backend
    container_name: buildflow_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/buildflow
      - JWT_SECRET=buildflow-secret-key-12345
    depends_on:
      db:
        condition: service_healthy
    networks:
      - buildflow_net

  frontend:
    build: ./frontend
    container_name: buildflow_web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - buildflow_net

networks:
  buildflow_net:
    driver: bridge

volumes:
  postgres_data:
